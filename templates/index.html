<!DOCTYPE html>
<html>
<head>
    <title>AI Analyst Copilot</title>
</head>
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
 
        body {
            background: #f3f6fb;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
 
        /* NAV */
        nav {
            background: #fff;
            border-bottom: 1px solid #e5eaf2;
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-brand {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-brand span {
            color: #0073e6;
        }
 
        /* MAIN */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
 
        .container {
            width: 100%;
            max-width: 460px;
        }
 
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
 
        .subtitle {
            font-size: 14px;
            color: #6b7a99;
            line-height: 1.6;
            margin-bottom: 28px;
        }
 
        /* CARD */
        .card {
            background: #fff;
            border: 1px solid #e5eaf2;
            border-radius: 12px;
            padding: 32px 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
 
        /* DROP ZONE */
        .drop-zone {
            border: 2px dashed #d0d9e8;
            border-radius: 8px;
            padding: 36px 20px;
            text-align: center;
            position: relative;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.2s, background 0.2s;
            background: #f8faff;
        }
        .drop-zone:hover {
            border-color: #0073e6;
            background: #f0f6ff;
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
 
        .drop-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .drop-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .drop-sub {
            font-size: 12px;
            color: #9aa5be;
        }
        .file-name {
            font-size: 12px;
            color: #0073e6;
            margin-top: 8px;
            min-height: 16px;
            font-weight: 500;
        }
 
        /* BUTTON */
        button {
            width: 100%;
            padding: 13px;
            background: #0073e6;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s, box-shadow 0.2s;
        }
        button:hover {
            background: #005fcc;
            box-shadow: 0 4px 16px rgba(0,115,230,0.25);
        }
 
        /* PILLS */
        .pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .pill {
            font-size: 11px;
            font-weight: 500;
            color: #0073e6;
            background: #edf4ff;
            border-radius: 20px;
            padding: 4px 12px;
        }
 
        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #9aa5be;
        }
    </style>
<body>


    <nav>
       <div class="nav-brand"> <span>AI</span> Analyst Copilot</div>
    </nav>
 
<main>
    <!--
    <h1>Upload Dataset</h1>
    
    <form action="/analyze" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Analyze</button>
    </form> 
    -->

    

    <div class="container">
        <h1>Upload your Dataset</h1>
        <p class="subtitle">Drop a CSV file and get instant EDA, visualizations, insights & ML predictions.</p>
 
        <div class="card">
            <form action="/analyze" method="POST" enctype="multipart/form-data">
            
                <div class="drop-zone">
                    <input type="file" name="file" required>
                    <div class="drop-icon">📂</div>
                    <div class="drop-title">Drop your file here</div>
                    <div class="drop-sub">or click to browse &nbsp;·&nbsp; CSV</div>
                    <div class="file-name" id="fname"></div>
                </div>
 
                <button type="submit">Analyze Dataset</button>
 
                <div class="pills">
                    <span class="pill">✓ Auto EDA</span>
                    <span class="pill">✓ ML Model</span>
                    <span class="pill">✓ AI Insights</span>
                    <span class="pill">✓ Visualizations</span>
                </div>
 
            </form>
        </div>
    </div>
</main>


</body>
</html>
